<!doctype html>
<html data-htmlattr="htmlAttributes">
  <head>
    <meta charset="utf-8">
    <!--!title-->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!--!meta-->

    <!-- Favicons and app icons -->
    <!-- If you want more control, you can create icons using https://realfavicongenerator.net/ and remove generated webmanifest from the server and Page -->
    <!-- Note: we generate web app manifest from design/branding.json, and it is set in src/components/Page/Page component -->
    <!-- Note: we don't use favicon.ico by default. However, favicon-48x48.png, favicon-32x32.png, favicon-16x16.png and apple-touch-icon come from hosted assets / Console -->
    <!-- End Favicons -->

    <!--!link-->
    <!--!ssrStyles-->
    <!--!ssrLinks-->

    <link rel="preload" href="/static/fonts/sora/sora-variable-latin.woff2" as="font" type="font/woff2" crossorigin>

    <style>

     /**
      * Sora — the marketplace brand font, self-hosted from /public/static/fonts/sora/.
      * Variable font: one file covers weights 100–800 (Sora has no italics; browsers
      * synthesize them if needed). Source: https://fonts.google.com/specimen/Sora
      */

      @font-face {
        font-family: 'Sora';
        font-style: normal;
        font-weight: 100 800;
        font-display: swap;
        src: url('/static/fonts/sora/sora-variable-latin.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: 'Sora';
        font-style: normal;
        font-weight: 100 800;
        font-display: swap;
        src: url('/static/fonts/sora/sora-variable-latin-ext.woff2') format('woff2');
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
    </style>

    <!--!script-->

  </head>
  <body>
    <div id="root"><!--!body--></div>
    <div id="portal-root"></div>

    <!--!preloadedStateScript-->

    <!--!ssrScripts-->

    <!--
         Note when adding new external scripts/styles/fonts/etc.:
         If a Content Security Policy (CSP) is turned on, the new URLs
         should be whitelisted in the policy.

         Check: /server/csp.js
    -->
  </body>
</html>
